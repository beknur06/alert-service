spring:
  application:
    name: ktj-alert-engine
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USER:guest}
    password: ${SPRING_RABBITMQ_PASS:guest}
    listener:
      simple:
        concurrency: 2
        prefetch: 50
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:telemetry}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true

server:
  port: 8084

rabbitmq:
  queue:
    alerts: telemetry.alerts

redis:
  channel:
    alerts: alerts
  key:
    ttl-seconds: 300

clickhouse:
  url: ${SPRING_CLICKHOUSE_URL:jdbc:ch://${{ clickhouse-server.RAILWAY_PRIVATE_DOMAIN }}:8123/digitaltwin?ssl=false&connect_timeout=10000&socket_timeout=300000&compress=0}
  username: ${CLICKHOUSE_USER:app}
  password: ${CLICKHOUSE_PASS:app123}

# Alert cooldown: don't re-fire same alert within N seconds
alert:
  cooldown-seconds: 300

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
spring:
  application:
    name: alert-service
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    listener:
      simple:
        concurrency: 2
        prefetch: 50
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:telemetry}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true

server:
  port: 8084

rabbitmq:
  queue:
    alerts: telemetry.alerts

redis:
  channel:
    alerts: alerts
  key:
    ttl-seconds: 300

# Alert cooldown: don't re-fire same alert within N seconds
alert:
  cooldown-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus